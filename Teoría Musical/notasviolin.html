    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Violín - Sprinkloud</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --verde-oscuro: #265C3D;
            --verde-claro: #73997B;
            --verde-debil: rgba(115, 153, 123, 0.25);
            --bronce: #C69D6D;
            --bronce-claro: #f4ebd9;
            --fondo: #f5f7f6;
            --madera: #3d2314;
            --piel: #f4a261;
            --piel-oscura: #e07a4f;
        }

        * {
            box-sizing: border-box;
            font-family: 'Fredoka One', 'Comic Sans MS', cursive, sans-serif;
        }

        body {
            background-color: var(--fondo);
            color: var(--verde-oscuro);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--verde-oscuro);
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px var(--bronce-claro);
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--bronce);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .instrucciones {
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
            max-width: 600px;
            border: 3px dashed var(--verde-claro);
            font-size: 0.95rem;
        }

        .contenedor-pentagrama-bloque {
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid var(--bronce-claro);
        }

        #pentagrama {
            width: 450px;
            height: 130px;
        }

        /* CONTENEDOR INTERACTIVO EN FORMATO HORIZONTAL */
        .interactor-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 850px;
        }

        /* COMPONENTE INTERFAZ VIOLÍN EN ORIENTACIÓN HORIZONTAL */
        .interfaz-violin {
            display: flex;
            flex-direction: row; /* Cambio clave: alineado horizontalmente */
            align-items: center;
            position: relative;
        }

        .cejilla {
            width: 35px;
            height: 240px; /* Invierte dimensiones */
            background: var(--bronce);
            border-radius: 12px 4px 4px 12px;
            display: flex;
            flex-direction: column; /* Botones ordenados de arriba a abajo */
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            box-shadow: -4px 0 6px rgba(0,0,0,0.1);
            z-index: 15;
        }

        .cuerda-aire {
            background: white;
            border: 2px solid var(--verde-oscuro);
            color: var(--verde-oscuro);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: -3px 2px 0 var(--verde-oscuro);
        }

        .cuerda-aire:active {
            transform: translate(-3px, 2px);
            box-shadow: 0px 0px 0 var(--verde-oscuro);
        }

        .mastil {
            background-color: var(--madera);
            width: 680px; /* El mástil ahora se extiende a lo largo */
            height: 240px; /* Ancho del mástil */
            border-radius: 0 25px 25px 0;
            display: flex;
            flex-direction: column; /* Las cuerdas van paralelas una debajo de la otra */
            justify-content: space-around;
            padding: 10px 0;
            position: relative;
            border-right: 15px solid #26150b;
        }



        .cuerda {
            height: 5px; /* La cuerda ahora tiene espesor vertical y longitud horizontal */
            background: linear-gradient(180deg, #ddd, #fff, #bbb);
            width: 100%;
            position: relative;
        }

        /* NOTAS / CÍRCULOS HORIZONTALES */
        .nota {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: absolute;
            top: 50%; /* Centrada verticalmente sobre su respectiva cuerda */
            left: 50%; /* Posicionada dinámicamente mediante JS a lo largo del eje X */
            transform: translate(-50%, -50%);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.70rem;
            font-weight: bold;
            color: white;
            transition: transform 0.15s, background-color 0.3s, box-shadow 0.3s;
            z-index: 10;
        }

        .nota.natural {
            background-color: var(--verde-oscuro);
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .nota.alterada {
            background-color: var(--verde-debil);
            border: 2px dashed rgba(255,255,255,0.6);
            color: rgba(38, 92, 61, 0.4);
        }

        .nota.activa {
            background-color: var(--bronce) !important;
            color: white !important;
            border: 3px solid white !important;
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px var(--bronce);
        }

        /* PANEL DE LA MANO UBICADO ABAJO EN POSICIÓN ANATÓMICA */
        .contenedor-mano {
            display: flex;
            flex-direction: row; /* Estructura horizontal para acompañar el flujo */
            align-items: center;
            gap: 30px;
            width: 100%;
            justify-content: center;
            border-top: 2px dashed #eee;
            padding-top: 20px;
        }

        .mano-titulo {
            font-size: 1rem;
            color: var(--bronce);
            background: var(--bronce-claro);
            padding: 8px 18px;
            border-radius: 12px;
            text-align: center;
            min-width: 250px;
        }

        .mano {
            position: relative;
            width: 140px;
            height: 120px;
            background: var(--piel);
            border-radius: 30px 30px 60px 60px; /* Ajuste para vista inferior del diapasón */
            box-shadow: inset 0 -8px 10px var(--piel-oscura);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 0 15px;
        }
        .pulgar {
            position: absolute;
            left: -35px;
            top: 2px;
            width: 40px;
            height: 65px;
            background: #f4a261;
            border-radius: 50%;
            box-shadow: inset -8px 0 10px #e07a4f;
            transform: rotate(-35deg);
        }

        .dedo {
            width: 28px;
            height: 75px;
            background: var(--piel);
            margin-top: -66px; /* Los dedos emergen hacia arriba apuntando al mástil */
            border-radius: 15px 15px 0 0;
            box-shadow: inset -4px 0 6px var(--piel-oscura);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 8px;
            font-size: 0.85rem;
            color: var(--verde-oscuro);
            font-weight: bold;
        }

        .dedo.oculto {
            height: 30px;
            margin-top: -20px;
            box-shadow: inset 0 0 5px var(--piel-oscura);
            color: transparent;
        }

        /* SEPARACIONES DINÁMICAS HORIZONTALES MEDIANTE MÁRGENES (Reglas Pedagógicas) */
        .mano.modo-sol #dedo-1 { margin-right: auto; } /* Índice separado */
        .mano.modo-sol #dedo-2 { margin-right: 2px; }  /* Medio y Anular juntos */
        .mano.modo-sol #dedo-3 { margin-left: 2px; }

        .mano.modo-relado #dedo-1 { margin-right: 2px; } /* Índice y Medio juntos */
        .mano.modo-relado #dedo-2 { margin-left: 2px; margin-right: auto; } /* Anular separado */

        .mano.modo-mi #dedo-1 { margin-right: 8px; } /* Todos separados */
        .mano.modo-mi #dedo-2 { margin-right: 8px; }
    </style>
</head>
<body>

<h1>SPRINKLOUD</h1>
<div class="subtitle">CLUB MUSICAL</div>



<div class="contenedor-pentagrama-bloque">
    <div id="pentagrama"></div>
</div>

<div class="interactor-container">

    <div class="interfaz-violin">

        <div class="cejilla">
            <button class="cuerda-aire" onclick="tocarCuerdaAire(196.00, 'sol', 'g/3', 'n')">Sol</button>
            <button class="cuerda-aire" onclick="tocarCuerdaAire(293.66, 're', 'd/4', 'n')">Re</button>
            <button class="cuerda-aire" onclick="tocarCuerdaAire(440.00, 'la', 'a/4', 'n')">La</button>
            <button class="cuerda-aire" onclick="tocarCuerdaAire(659.25, 'mi', 'e/5', 'n')">Mi</button>
        </div>

        <div class="mastil" id="mastil">

        </div>
    </div>

    <div class="contenedor-mano">
        <div class="mano-titulo" id="mano-estado">Cuerda Suelta</div>
        <div class="mano" id="mano-visual">
            <div class="pulgar"></div>
            <div id="dedo-1" class="dedo oculto">I</div>
            <div id="dedo-2" class="dedo oculto">M</div>
            <div id="dedo-3" class="dedo oculto">A</div>


        </div>
    </div>

</div>

<script>
    // Mapeo adaptado con coordenadas de izquierda a derecha (coordenadas en eje X)
    const mapaCuerdas = [
        {
            id: 'sol',
            baseFreq: 196.00,
            notas: [
                { semitonos: 2, tipo: 'natural', label: '', vfKey: 'a/3', acc: 'n' },
                { semitonos: 3, tipo: 'alterada', label: '', vfKey: 'a/3', acc: '#' },
                { semitonos: 4, tipo: 'natural', label: '', vfKey: 'b/3', acc: 'n' },
                { semitonos: 5, tipo: 'natural', label: 'Do', vfKey: 'c/4', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: '', vfKey: 'c/4', acc: '#' },
                { semitonos: 7, tipo: 'natural', label: '', vfKey: 'd/4', acc: 'n' }
            ]
        },
        {
            id: 're',
            baseFreq: 293.66,
            notas: [
                { semitonos: 1, tipo: 'alterada', label: '', vfKey: 'd/4', acc: '#' },
                { semitonos: 2, tipo: 'natural', label: 'Mi', vfKey: 'e/4', acc: 'n' },
                { semitonos: 3, tipo: 'natural', label: 'Fa', vfKey: 'f/4', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: '', vfKey: 'f/4', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'Sol', vfKey: 'g/4', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: '', vfKey: 'g/4', acc: '#' },
                { semitonos: 7, tipo: 'natural', label: '', vfKey: 'a/4', acc: 'n' }
            ]
        },
        {
            id: 'la',
            baseFreq: 440.00,
            notas: [
                { semitonos: 1, tipo: 'alterada', label: '', vfKey: 'a/4', acc: '#' },
                { semitonos: 2, tipo: 'natural', label: 'Si', vfKey: 'b/4', acc: 'n' },
                { semitonos: 3, tipo: 'natural', label: 'Do', vfKey: 'c/5', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: '', vfKey: 'c/5', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'Re', vfKey: 'd/5', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: '', vfKey: 'd/5', acc: '#' },
                { semitonos: 7, tipo: 'natural', label: '', vfKey: 'e/5', acc: 'n' }
            ]
        },
        {
            id: 'mi',
            baseFreq: 659.25,
            notas: [
                { semitonos: 1, tipo: 'natural', label: 'Fa', vfKey: 'f/5', acc: 'n' },
                { semitonos: 2, tipo: 'alterada', label: '', vfKey: 'f/5', acc: '#' },
                { semitonos: 3, tipo: 'natural', label: 'Sol', vfKey: 'g/5', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: '', vfKey: 'g/5', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'La', vfKey: 'a/5', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: '', vfKey: 'a/5', acc: '#' },
                { semitonos: 7, tipo: 'natural', label: 'Si', vfKey: 'b/5', acc: 'n' },
                { semitonos: 8, tipo: 'natural', label: 'Do', vfKey: 'c/6', acc: 'n' },
                /*{ semitonos: 9, tipo: 'alterada', label: 'Do#', vfKey: 'c/6', acc: '#' },
                { semitonos: 10, tipo: 'natural', label: 'Re', vfKey: 'd/6', acc: 'n' },
                { semitonos: 11, tipo: 'alterada', label: 'Re#', vfKey: 'd/6', acc: '#' },
                { semitonos: 12, tipo: 'natural', label: 'Mi', vfKey: 'e/6', acc: 'n' }*/
            ]
        }
    ];

    const mastil = document.getElementById('mastil');
    const manoVisual = document.getElementById('mano-visual');
    const manoEstado = document.getElementById('mano-estado');
    let ctxAudio = null;

    const { Renderer, Stave, StaveNote, Accidental, Formatter } = Vex.Flow;

    window.addEventListener('DOMContentLoaded', () => {
        renderizarPentagrama('b/4', 'n');
    });

    function renderizarPentagrama(key, accidental) {
        const divPentagrama = document.getElementById('pentagrama');
        divPentagrama.innerHTML = "";

        const renderer = new Renderer(divPentagrama, Renderer.Backends.SVG);
        renderer.resize(450, 130);
        const context = renderer.getContext();

        const stave = new Stave(10, 10, 400);
        stave.addClef("treble");
        stave.setContext(context).draw();

        const notaStave = new StaveNote({
            keys: [key],
            duration: "q"
        });

        if (accidental === '#') {
            notaStave.addModifier(new Accidental("#"), 0);
        }

        Formatter.FormatAndDraw(context, stave, [notaStave]);
    }

    function obtenerContextoAudio() {
        if (!ctxAudio) {
            ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        }
        return ctxAudio;
    }

    function emitirSonido(frecuencia) {
        const ctx = obtenerContextoAudio();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(frecuencia, ctx.currentTime);

        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.08);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 1.2);
    }

    function calcularFrecuencia(base, semitonos) {
        return base * Math.pow(2, semitonos / 12);
    }

    function actualizarMano(cuerdaId) {
        manoVisual.className = "mano";

        document.getElementById('dedo-1').classList.remove('oculto');
        document.getElementById('dedo-2').classList.remove('oculto');
        document.getElementById('dedo-3').classList.remove('oculto');

        if (cuerdaId === 'sol') {
            manoVisual.classList.add('modo-sol');
            manoEstado.innerHTML = "Cuerda SOL <br> (M & A juntos)";
        } else if (cuerdaId === 're' || cuerdaId === 'la') {
            manoVisual.classList.add('modo-relado');
            manoEstado.innerHTML = `Cuerda ${cuerdaId.toUpperCase()} <br> (Í & M juntos)`;
        } else if (cuerdaId === 'mi') {
            manoVisual.classList.add('modo-mi');
            manoEstado.innerHTML = "Cuerda MI <br> (Todos separados)";
        }
    }

    function tocarCuerdaAire(frec, cuerdaId, vfKey, acc) {
        emitirSonido(frec);
        renderizarPentagrama(vfKey, acc);
        manoEstado.innerHTML = `Cuerda ${cuerdaId.toUpperCase()} al Aire`;

        document.getElementById('dedo-1').classList.add('oculto');
        document.getElementById('dedo-2').classList.add('oculto');
        document.getElementById('dedo-3').classList.add('oculto');

        document.querySelectorAll('.nota').forEach(el => el.classList.remove('activa'));
    }

    // CONSTRUCCIÓN DINÁMICA DEL MÁSTIL HORIZONTAL
    mapaCuerdas.forEach(cuerda => {
        const contenedorCuerda = document.createElement('div');
        contenedorCuerda.className = 'cuerda';

        cuerda.notas.forEach(n => {
            const nodoNota = document.createElement('div');
            nodoNota.className = `nota ${n.tipo}`;
            nodoNota.innerText = n.label;

            // En lugar de "top", ahora calculamos "left" para la progresión en el eje X
            const distanciaLeft = (n.semitonos / 13) * 100;
            nodoNota.style.left = `${distanciaLeft}%`;

            nodoNota.addEventListener('click', (e) => {
                e.stopPropagation();

                document.querySelectorAll('.nota').forEach(el => el.classList.remove('activa'));

                const freqFinal = calcularFrecuencia(cuerda.baseFreq, n.semitonos);
                emitirSonido(freqFinal);
                actualizarMano(cuerda.id);
                renderizarPentagrama(n.vfKey, n.acc);

                nodoNota.classList.add('activa');
            });

            contenedorCuerda.appendChild(nodoNota);
        });

        mastil.appendChild(contenedorCuerda);
    });
</script>
</body>
</html>
