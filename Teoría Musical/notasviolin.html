<script>
    const mapaCuerdas = [
        {
            id: 'sol',
            baseFreq: 196.00,
            notas: [
                { semitonos: 1, tipo: 'alterada', label: 'Sol#', vfKey: 'g/3', acc: '#' },
                { semitonos: 2, tipo: 'natural', label: 'La', vfKey: 'a/3', acc: 'n' },

                { semitonos: 5, tipo: 'natural', label: 'Do', vfKey: 'c/4', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: 'Do#', vfKey: 'c/4', acc: '#' },
                { semitonos: 7, tipo: 'alterada', label: 'Re', vfKey: 'd/4', acc: 'n' },
                { semitonos: 8, tipo: 'alterada', label: 'Re#', vfKey: 'd/4', acc: '#' },

                { semitonos: 11, tipo: 'alterada', label: 'Fa#', vfKey: 'f/4', acc: '#' }
            ]
        },
        {
            id: 're',
            baseFreq: 293.66,
            notas: [
                { semitonos: 1, tipo: 'alterada', label: 'Re#', vfKey: 'd/4', acc: '#' },
                { semitonos: 2, tipo: 'natural', label: 'Mi', vfKey: 'e/4', acc: 'n' },
                { semitonos: 3, tipo: 'natural', label: 'Fa', vfKey: 'f/4', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: 'Fa#', vfKey: 'f/4', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'Sol', vfKey: 'g/4', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: 'Sol#', vfKey: 'g/4', acc: '#' },
                { semitonos: 7, tipo: 'alterada', label: 'La', vfKey: 'a/4', acc: 'n' },
                { semitonos: 8, tipo: 'alterada', label: 'La#', vfKey: 'a/4', acc: '#' },
                { semitonos: 9, tipo: 'alterada', label: 'Si', vfKey: 'b/4', acc: 'n' },
                { semitonos: 10, tipo: 'alterada', label: 'Do', vfKey: 'c/5', acc: 'n' },
                { semitonos: 11, tipo: 'alterada', label: 'Do#', vfKey: 'c/5', acc: '#' },
            ]
        },
        {
            id: 'la',
            baseFreq: 440.00,
            notas: [
                { semitonos: 1, tipo: 'alterada', label: 'La#', vfKey: 'a/4', acc: '#' },
                { semitonos: 2, tipo: 'natural', label: 'Si', vfKey: 'b/4', acc: 'n' },
                { semitonos: 3, tipo: 'natural', label: 'Do', vfKey: 'c/5', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: 'Do#', vfKey: 'c/5', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'Re', vfKey: 'd/5', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: 'Re#', vfKey: 'd/5', acc: '#' },
                { semitonos: 7, tipo: 'alterada', label: 'Mi', vfKey: 'e/5', acc: 'n' },
                { semitonos: 8, tipo: 'alterada', label: 'Fa', vfKey: 'f/5', acc: 'n' },
                { semitonos: 9, tipo: 'alterada', label: 'Fa#', vfKey: 'f/5', acc: '#' },
                { semitonos: 10, tipo: 'alterada', label: 'Sol', vfKey: 'g/5', acc: 'n' },
                { semitonos: 11, tipo: 'alterada', label: 'Sol#', vfKey: 'g/5', acc: '#' },
            ]
        },
        {
            id: 'mi',
            baseFreq: 659.25,
            notas: [
                { semitonos: 1, tipo: 'natural', label: 'Fa', vfKey: 'f/5', acc: 'n' },
                { semitonos: 2, tipo: 'alterada', label: 'Fa#', vfKey: 'f/5', acc: '#' },
                { semitonos: 3, tipo: 'natural', label: 'Sol', vfKey: 'g/5', acc: 'n' },
                { semitonos: 4, tipo: 'alterada', label: 'Sol#', vfKey: 'g/5', acc: '#' },
                { semitonos: 5, tipo: 'natural', label: 'La', vfKey: 'a/5', acc: 'n' },
                { semitonos: 6, tipo: 'alterada', label: 'La#', vfKey: 'a/5', acc: '#' },
                { semitonos: 7, tipo: 'alterada', label: 'Si', vfKey: 'b/5', acc: 'n' },
                { semitonos: 8, tipo: 'alterada', label: 'Do', vfKey: 'c/6', acc: 'n' },
                { semitonos: 9, tipo: 'alterada', label: 'Do#', vfKey: 'c/6', acc: '#' },
                { semitonos: 10, tipo: 'alterada', label: 'Re', vfKey: 'd/6', acc: 'n' },
                { semitonos: 11, tipo: 'alterada', label: 'Re#', vfKey: 'd/6', acc: '#' }
            ]
        }
    ];

    const mastil = document.getElementById('mastil');
    let ctxAudio = null;

    const { Renderer, Stave, StaveNote, Accidental, Formatter } = Vex.Flow;

    window.addEventListener('DOMContentLoaded', () => {
        renderizarPentagrama('b/4', 'n');
    });

    function renderizarPentagrama(key, accidental) {
        const divPentagrama = document.getElementById('pentagrama');
        divPentagrama.innerHTML = "";

        const renderer = new Renderer(divPentagrama, Renderer.Backends.SVG);
        renderer.resize(320, 120);
        const context = renderer.getContext();

        const stave = new Stave(10, 5, 290);
        stave.addClef("treble");
        stave.setContext(context).draw();

        const notaStave = new StaveNote({
            keys: [key],
            duration: "q"
        });

        if (accidental === '#') {
            notaStave.addModifier(new Accidental("#"), 0);
        }

        Formatter.FormatAndDraw(context, stave, [notaStave]);
    }

    function obtenerContextoAudio() {
        if (!ctxAudio) {
            ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        }
        return ctxAudio;
    }

    function emitirSonido(frecuencia) {
        const ctx = obtenerContextoAudio();
        if (ctx.state === 'suspended') {
            ctx.resume();
        }

        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(frecuencia, ctx.currentTime);

        gainNode.gain.setValueAtTime(0, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.08);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 1.2);
    }

    function calcularFrecuencia(base, semitonos) {
        return base * Math.pow(2, semitonos / 12);
    }

    function tocarCuerdaAire(frec, cuerdaId, vfKey, acc) {
        emitirSonido(frec);
        renderizarPentagrama(vfKey, acc);
        document.querySelectorAll('.nota').forEach(el => el.classList.remove('activa'));
    }

    mapaCuerdas.forEach(cuerda => {
        const contenedorCuerda = document.createElement('div');
        contenedorCuerda.className = 'cuerda';

        cuerda.notas.forEach(n => {
            const nodoNota = document.createElement('div');
            nodoNota.className = `nota ${n.tipo}`;
            nodoNota.innerText = n.label;

            const distanciaLeft = (n.semitonos / 13) * 100;
            nodoNota.style.left = `${distanciaLeft}%`;

            nodoNota.addEventListener('pointerdown', (e) => {
                e.stopPropagation();

                document.querySelectorAll('.nota').forEach(el => el.classList.remove('activa'));

                const freqFinal = calcularFrecuencia(cuerda.baseFreq, n.semitonos);
                emitirSonido(freqFinal);
                renderizarPentagrama(n.vfKey, n.acc);

                nodoNota.classList.add('activa');
            });

            contenedorCuerda.appendChild(nodoNota);
        });

        mastil.appendChild(contenedorCuerda);
    });
</script>
